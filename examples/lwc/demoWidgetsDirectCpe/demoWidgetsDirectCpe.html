<template>
    <div class="slds-p-around_small">
        <div class="slds-m-bottom_medium">
            <c-pflow-molecule-custom-lookup
                label="SObject"
                field-level-help="SObject the pickers and WHERE builder operate on."
                placeholder="Search objects..."
                variant="label-stacked"
                selection={_sobjectSelection}
                min-search-term-length="0"
                scroll-after-n-items="8"
                onsearch={handleSobjectSearch}
                onselectionchange={handleSobjectSelectionChange}
            ></c-pflow-molecule-custom-lookup>
        </div>

        <div class="slds-m-bottom_medium">
            <c-pflow-molecule-field-picker
                label="Sort Field"
                field-level-help="Single-select field picker that emits a fieldchange event."
                object-api-name={_sobjectApiName}
                value={_sortField}
                onfieldchange={handleSortFieldChange}
            ></c-pflow-molecule-field-picker>
        </div>

        <div class="slds-m-bottom_medium">
            <c-pflow-molecule-field-picker
                label="Additional Fields"
                field-level-help="Same picker component with isMultiEntry set; renders pills and emits change with a CSV value."
                object-api-name={_sobjectApiName}
                value={_additionalFields}
                is-multi-entry
                onchange={handleAdditionalFieldsChange}
            ></c-pflow-molecule-field-picker>
        </div>

        <div class="slds-m-bottom_medium">
            <label class="slds-form-element__label">
                Where Clause
                <lightning-helptext content="Visual WHERE builder. Operators are filtered by field type; emits wherechange with a SOQL fragment and parsed conditions."></lightning-helptext>
            </label>
            <c-pflow-organism-where-builder
                object-api-name={_sobjectApiName}
                value={_whereClause}
                onwherechange={handleWhereChange}
            ></c-pflow-organism-where-builder>
        </div>

        <div>
            <label class="slds-form-element__label">
                Order &amp; Limit
                <lightning-helptext content="ORDER BY field + direction + optional LIMIT (clamped 0\u20132000)."></lightning-helptext>
            </label>
            <c-pflow-molecule-order-limit
                object-api-name={_sobjectApiName}
                order-by-field={_orderByField}
                order-by-direction={_orderByDirection}
                query-limit={_queryLimit}
                onorderchange={handleOrderChange}
                onlimitchange={handleLimitChange}
            ></c-pflow-molecule-order-limit>
        </div>
    </div>
</template>
