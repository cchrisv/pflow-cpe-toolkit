<template>
    <lightning-layout multiple-rows>
        <lightning-layout-item
            size={size}
            medium-device-size={computedMediumDeviceSize}
            large-device-size={computedLargeDeviceSize}
            padding={padding}
            flexibility="auto"
        >
            <template lwc:if={grouped}>
                <fieldset class={fieldClasses} role="group" aria-labelledby={legendId}>
                    <div class="mqf-row">
                        <span class={badgeClasses} aria-hidden="true">
                            <template lwc:if={showCheckmark}
                                ><lightning-icon icon-name="utility:check" size="xx-small" variant="inverse"></lightning-icon></template
                            ><template lwc:else>{questionNumber}</template>
                        </span>
                        <div class="mqf-body">
                            <template lwc:if={fieldLabel}>
                                <legend id={legendId} class="mqf-label"
                                    >{fieldLabel}<template lwc:if={isOptional}
                                        ><span class="mqf-optional">(optional)</span></template
                                    ><template lwc:if={fieldLevelHelp}
                                        ><lightning-helptext content={fieldLevelHelp}></lightning-helptext></template
                                    >
                                </legend>
                            </template>
                            <div class="mqf-control"><slot></slot></div>
                            <template lwc:if={errorMessage}>
                                <div class="mqf-error" aria-live="assertive" role="alert">
                                    {errorMessage}
                                </div>
                            </template>
                        </div>
                    </div>
                </fieldset>
            </template>
            <template lwc:else>
                <div class={fieldClasses}>
                    <div class="mqf-row">
                        <span class={badgeClasses} aria-hidden="true">
                            <template lwc:if={showCheckmark}
                                ><lightning-icon icon-name="utility:check" size="xx-small" variant="inverse"></lightning-icon></template
                            ><template lwc:else>{questionNumber}</template>
                        </span>
                        <div class="mqf-body">
                            <template lwc:if={fieldLabel}>
                                <p class="mqf-label"
                                    >{fieldLabel}<template lwc:if={isOptional}
                                        ><span class="mqf-optional">(optional)</span></template
                                    ><template lwc:if={fieldLevelHelp}
                                        ><lightning-helptext content={fieldLevelHelp}></lightning-helptext></template
                                    >
                                </p>
                            </template>
                            <div class="mqf-control"><slot></slot></div>
                            <template lwc:if={errorMessage}>
                                <div class="mqf-error" aria-live="assertive" role="alert">
                                    {errorMessage}
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </template>
        </lightning-layout-item>
    </lightning-layout>
</template>
