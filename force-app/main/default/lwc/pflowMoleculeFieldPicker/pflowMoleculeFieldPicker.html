<template>
    <template lwc:if={isMultiEntry}>
        <label lwc:if={label} class="slds-form-element__label">{label}</label>
        <template lwc:if={fieldLevelHelp}>
            <div class="slds-form-element__help slds-text-body_small slds-text-color_weak slds-m-bottom_xx-small">
                {fieldLevelHelp}
            </div>
        </template>
        <template lwc:if={hasSelected}>
            <div class="slds-pill_container slds-m-bottom_xx-small">
                <template for:each={_selectedFields} for:item="field">
                    <lightning-pill
                        key={field.id}
                        label={field.title}
                        name={field.id}
                        title={field.subtitle}
                        onremove={handleRemovePill}
                    >
                        <lightning-icon lwc:if={field.icon} icon-name={field.icon}></lightning-icon>
                    </lightning-pill>
                </template>
            </div>
        </template>
    </template>
    <c-pflow-molecule-custom-lookup
        label={label}
        field-level-help={fieldLevelHelp}
        placeholder={placeholder}
        variant={lookupVariant}
        selection={selection}
        disabled={disabled}
        required={required}
        min-search-term-length="0"
        scroll-after-n-items="7"
        onsearch={handleSearch}
        onselectionchange={handleSelectionChange}
    ></c-pflow-molecule-custom-lookup>
</template>
