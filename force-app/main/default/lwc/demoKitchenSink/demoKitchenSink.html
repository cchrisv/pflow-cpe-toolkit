<template>
    <div class="slds-card slds-p-around_medium">
        <h2 class="slds-text-heading_small slds-m-bottom_small">{label}</h2>
        <dl class="slds-list_horizontal slds-wrap">
            <dt class="slds-item_label slds-text-color_weak">Text:</dt>
            <dd class="slds-item_detail">{textValue}</dd>

            <dt class="slds-item_label slds-text-color_weak">Pattern:</dt>
            <dd class="slds-item_detail">{pattern}</dd>

            <dt class="slds-item_label slds-text-color_weak">Count:</dt>
            <dd class="slds-item_detail">{count}</dd>

            <dt class="slds-item_label slds-text-color_weak">Active:</dt>
            <dd class="slds-item_detail">{activeDisplay}</dd>

            <dt class="slds-item_label slds-text-color_weak">Show header:</dt>
            <dd class="slds-item_detail">{showHeaderDisplay}</dd>

            <dt class="slds-item_label slds-text-color_weak">Go live:</dt>
            <dd class="slds-item_detail">{goLive}</dd>

            <dt class="slds-item_label slds-text-color_weak">Deadline:</dt>
            <dd class="slds-item_detail">{deadline}</dd>

            <dt class="slds-item_label slds-text-color_weak">Priority:</dt>
            <dd class="slds-item_detail">{priority}</dd>

            <dt class="slds-item_label slds-text-color_weak">Default owner:</dt>
            <dd class="slds-item_detail">{defaultOwner}</dd>
        </dl>
    </div>
</template>
