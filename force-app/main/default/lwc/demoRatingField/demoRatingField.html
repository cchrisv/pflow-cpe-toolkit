<template>
    <div class="slds-form-element slds-p-around_small">
        <label lwc:if={label} class="slds-form-element__label">
            {label}
            <abbr lwc:if={required} class="slds-required" title="required">*</abbr>
        </label>
        <div class="slds-form-element__control" role="radiogroup" aria-label={label}>
            <template for:each={stars} for:item="star">
                <button
                    key={star.index}
                    type="button"
                    class={star.buttonClass}
                    data-index={star.index}
                    aria-label={star.ariaLabel}
                    onclick={handleStarClick}
                >
                    <lightning-icon
                        icon-name={star.iconName}
                        variant={star.variant}
                        size="small"
                    ></lightning-icon>
                </button>
            </template>
        </div>
        <div lwc:if={errorMessage} class="slds-form-element__help slds-text-color_destructive" role="alert">
            {errorMessage}
        </div>
    </div>
</template>
